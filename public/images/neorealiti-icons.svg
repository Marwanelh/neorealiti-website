  <!-- Row 2 -->

  <!-- Immersive Retail -->
  <g transform="translate(40, 200)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>
    <g transform="translate(16, 16)" stroke="#00C8DC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 4L6 12v28a4 4 0 0 0 4 4h28a4 4 0 0 0 4-4V12L36 4z"/>
      <path d="M6 12h36"/>
      <path d="M32 20a8 8 0 0 1-16 0"/>

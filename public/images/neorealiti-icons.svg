    <text x="40" y="307" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Simulations</text>
  </g>

  <!-- Spatial Data Visualization -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>
    <g transform="translate(16, 16)" stroke="#00C8DC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 6v36h36"/>
      <path d="M36 34V18M26 34V10M16 34v-6"/>
    </g>
    <text x="40" y="296" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Spatial Data</text>
    <text x="40" y="307" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Visualization</text>
  </g>

  <!-- Systems Integration -->
  <g transform="translate(400, 200)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>
    <g transform="translate(16, 16)" stroke="#00C8DC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 26a10 10 0 0 0 15.08 1.08l6-6a10 10 0 0 0-14.14-14.14l-3.44 3.42"/>
      <path d="M28 22a10 10 0 0 0-15.08-1.08l-6 6a10 10 0 0 0 14.14 14.14l3.42-3.42"/>
    </g>
    <text x="40" y="296" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Systems</text>
    <text x="40" y="307" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Integration</text>

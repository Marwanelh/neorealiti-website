      <path d="M4 24s6-14 20-14 20 14 20 14-6 14-20 14-20-14-20-14z"/>
      <circle cx="24" cy="24" r="6"/>
    </g>
    <text x="40" y="96" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Augmented &amp;</text>
    <text x="40" y="107" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Mixed Reality</text>
  </g>

  <!-- AI Process Automation -->
  <g transform="translate(280, 40)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>
    <g transform="translate(16, 16)" stroke="#00C8DC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="18" y="18" width="12" height="12" rx="2"/>
      <path d="M18 4v4m12-4v4M18 40v4m12-4v4M4 18h4m-4 12h4M40 18h4m-4 12h4"/>
    </g>
    <text x="40" y="96" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">AI Process</text>
    <text x="40" y="107" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Automation</text>
  </g>

  <!-- Digital Twin Solutions -->

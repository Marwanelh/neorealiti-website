<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" fill="none">

  <!-- Row 1: Service Icons -->

  <!-- Holographic Displays -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>
    <g transform="translate(16, 16)" stroke="#00C8DC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 4L4 14l20 10 20-10-20-10z"/>
      <path d="M4 34l20 10 20-10"/>
      <path d="M4 24l20 10 20-10"/>
    </g>
    <text x="40" y="96" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Holographic</text>
    <text x="40" y="107" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Displays</text>
  </g>

  <!-- Augmented & Mixed Reality -->
  <g transform="translate(160, 40)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>

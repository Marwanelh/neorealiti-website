    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>
    <g transform="translate(16, 16)" stroke="#00C8DC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="6" width="40" height="28" rx="4"/>
      <path d="M16 42h16m-8-8v8"/>
      <path d="M14 16h20M14 24h12"/>
    </g>
    <text x="40" y="96" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Digital Twin</text>
    <text x="40" y="107" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Solutions</text>

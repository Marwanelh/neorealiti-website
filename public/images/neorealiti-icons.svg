    <text x="40" y="296" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Immersive Retail</text>
    <text x="40" y="307" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Experiences</text>
  </g>

  <!-- VR Training -->
  <g transform="translate(160, 200)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#0B0F1A"/>
    <g transform="translate(16, 16)" stroke="#00C8DC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
